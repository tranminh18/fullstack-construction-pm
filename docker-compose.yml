services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/construction.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8080
    # Seed dữ liệu mẫu (idempotent) rồi chạy server.
    command: sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

  # For production, we'd add:
  # - PostgreSQL database
  # - Redis for caching/OTP
  # - MinIO for file storage
  # - Nginx/Traefik as reverse proxy with TLS

volumes:
  uploads:
  data:
